services:
  mongodb:
    image: mongo:7
    container_name: health-mongodb
    restart: unless-stopped
    ports:
      - "27019:27017"
    environment:
      MONGO_INITDB_ROOT_USERNAME: health_user
      MONGO_INITDB_ROOT_PASSWORD: health_password
      MONGO_INITDB_DATABASE: health
    volumes:
      - mongodb_data:/data/db

volumes:
  mongodb_data:
